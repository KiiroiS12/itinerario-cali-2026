<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semana Santa Cali 2026 | Holy Week Cali 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8faf9;
        --surface: #ffffff;
        --surface-day: #ffffff;
        --text: #1a2e28;
        --text-muted: #5a6e68;
        --accent: #0d9488;
        --accent-hover: #0f766e;
        --accent-light: #ccfbf1;
        --border: #e2e8e6;
        --card-shadow: 0 2px 12px rgba(13, 148, 136, 0.08);
        --radius: 14px;
        --radius-sm: 10px;
      }

      [data-theme="dark"] {
        --bg: #0f1419;
        --surface: #1a2228;
        --surface-day: #242d34;
        --text: #e8edeb;
        --text-muted: #9ca8a4;
        --accent: #2dd4bf;
        --accent-hover: #5eead4;
        --accent-light: #134e4a;
        --border: #2d3835;
        --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
        transition:
          background 0.3s ease,
          color 0.3s ease;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 1rem 1.25rem 2rem;
      }

      /* Header */
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 0 1.5rem;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.02em;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-icon {
        width: 44px;
        height: 44px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .btn-icon:hover {
        background: var(--accent-light);
        color: var(--accent);
      }

      .btn-icon:active {
        transform: scale(0.96);
      }

      .btn-icon svg {
        width: 20px;
        height: 20px;
      }

      /* Hero */
      .hero {
        text-align: center;
        padding: 1.75rem 0 1.5rem;
      }

      .hero h1 {
        font-size: clamp(1.5rem, 4vw, 1.75rem);
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.35rem;
      }

      .hero .subtitle {
        font-size: 0.95rem;
        color: var(--text-muted);
      }

      .hero-budget {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--accent);
        margin-top: 0.5rem;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0;
      }

      .tab-btn {
        padding: 0.75rem 1.25rem;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        color: var(--text-muted);
        background: transparent;
        border: none;
        border-bottom: 3px solid transparent;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s;
        margin-bottom: -1px;
      }

      .tab-btn:hover {
        color: var(--text);
      }

      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .tab-panel {
        display: block;
      }

      .tab-panel.hidden {
        display: none !important;
      }

      /* Plan económico */
      .economico-intro {
        font-size: 0.95rem;
        color: var(--text-muted);
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }

      .economico-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .economico-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.25rem;
        box-shadow: var(--card-shadow);
      }

      .economico-card h4 {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.35rem;
      }

      .economico-card .economico-desc {
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 0.5rem;
      }

      .economico-card .economico-cost {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--accent);
      }

      .day-detail-head .day-budget {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--accent);
        margin-top: 0.35rem;
      }

      .activity-cost {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      .modal-cost-line {
        font-size: 0.9rem;
        color: var(--text);
        margin-bottom: 0.25rem;
      }

      .modal-cost-line strong {
        color: var(--accent);
      }

      /* Calendar */
      .calendar-section {
        margin-bottom: 1.5rem;
      }

      .calendar-section h2 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .calendar-grid {
        display: flex;
        flex-wrap: nowrap;
        gap: 0.6rem;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scroll-snap-type: x proximity;
        padding-bottom: 0.25rem;
        margin: 0 -0.25rem;
      }

      .calendar-grid .day-card {
        flex: 0 0 auto;
        min-width: 72px;
        scroll-snap-align: start;
      }

      @media (min-width: 480px) {
        .calendar-grid {
          display: grid;
          grid-template-columns: repeat(5, 1fr);
          overflow: visible;
          scroll-snap-type: none;
          margin: 0;
          padding-bottom: 0;
        }

        .calendar-grid .day-card {
          min-width: unset;
        }
      }

      @media (min-width: 640px) {
        .calendar-grid {
          grid-template-columns: repeat(9, 1fr);
          gap: 0.75rem;
        }
      }

      .day-card {
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.85rem 0.5rem;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
      }

      [data-theme="dark"] .day-card {
        background: var(--surface-day);
      }

      [data-theme="dark"] .day-card:hover {
        background: #2d3a40;
      }

      .day-card:hover {
        border-color: var(--accent);
        background: var(--accent-light);
      }

      .day-card.active {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      .day-card .date-num {
        font-size: 1.25rem;
        font-weight: 700;
        display: block;
        margin-bottom: 0.2rem;
      }

      .day-card .date-day {
        font-size: 0.7rem;
        opacity: 0.9;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      .day-card.active .date-day {
        opacity: 1;
      }

      /* Day detail */
      .day-detail {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 1.25rem 1.25rem 1.5rem;
        box-shadow: var(--card-shadow);
        border: 1px solid var(--border);
      }

      .day-detail-head {
        margin-bottom: 1.25rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      .day-detail-head h3 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--text);
      }

      .day-detail-head .date-badge {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      .activities-list {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }

      .activity-item {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.75rem 1rem;
        align-items: start;
        padding: 0.9rem 1rem;
        background: var(--bg);
        border-radius: var(--radius-sm);
        border-left: 3px solid var(--accent);
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .activity-item:hover {
        transform: translateX(4px);
        box-shadow: var(--card-shadow);
      }

      .activity-time {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--accent);
        white-space: nowrap;
      }

      .activity-content {
        min-width: 0;
      }

      .activity-content .title {
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text);
      }

      .activity-content .place {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
      }

      .empty-state {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .empty-state svg {
        width: 48px;
        height: 48px;
        margin-bottom: 0.75rem;
        opacity: 0.6;
      }

      /* Modal */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }

      .modal-backdrop.is-open {
        opacity: 1;
        visibility: visible;
      }

      .modal-backdrop.is-open .modal-box {
        transform: scale(1);
        opacity: 1;
      }

      .modal-box {
        background: var(--surface);
        border-radius: var(--radius);
        max-width: 440px;
        width: 100%;
        max-height: 85vh;
        overflow: hidden;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        transform: scale(0.9);
        opacity: 0;
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.25s ease;
      }

      .modal-header {
        padding: 1.25rem 1.25rem 0.75rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .modal-header h3 {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }

      .modal-close {
        width: 36px;
        height: 36px;
        border: none;
        background: var(--bg);
        color: var(--text-muted);
        border-radius: var(--radius-sm);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .modal-close:hover {
        background: var(--accent-light);
        color: var(--accent);
      }

      .modal-body {
        padding: 1.25rem;
        overflow-y: auto;
        max-height: calc(85vh - 80px);
      }

      .modal-image-wrap {
        margin-bottom: 1rem;
        border-radius: var(--radius-sm);
        overflow: hidden;
        background: var(--bg);
      }

      .modal-image-wrap img {
        width: 100%;
        height: auto;
        display: block;
        max-height: 220px;
        object-fit: cover;
      }

      .modal-meta {
        font-size: 0.85rem;
        color: var(--accent);
        font-weight: 600;
        margin-bottom: 1rem;
      }

      .modal-section {
        margin-bottom: 1.25rem;
      }

      .modal-section:last-child {
        margin-bottom: 0;
      }

      .modal-section-title {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        margin-bottom: 0.4rem;
      }

      .modal-section p {
        font-size: 0.9rem;
        color: var(--text);
        line-height: 1.55;
      }

      .modal-address a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }

      .modal-address a:hover {
        text-decoration: underline;
      }

      /* Footer */
      footer {
        text-align: center;
        padding: 2rem 0 1rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      }
    </style>
  </head>

          </div>
        </section>
      </div>

      <div class="tab-panel hidden" id="panelEconomico" role="tabpanel">
        <p class="economico-intro" id="economicoIntro"></p>
        <div class="economico-list" id="economicoList"></div>
      </div>

      <footer>
        <p data-i18n="footer">Cali & Jamundí · Semana Santa 2026</p>
      </footer>
    </div>

    <div class="modal-backdrop" id="activityModal" aria-hidden="true">
      <div
        class="modal-box"
        role="dialog"
        aria-modal="true"

              height="20"

              stroke="currentColor"

        <div class="modal-body">

          </div>
        </div>
      </div>
    </div>

      function getTotalBudget() {
        let total = 0;
        dates.forEach((dateStr) => {
          (itinerary[dateStr] || []).forEach((a) => {
            total += (a.cost || 0) + (a.transportCost || 0);
          });
        });
        return total;

        const activities = itinerary[dateStr];
        if (!activities) return 0;
        return activities.reduce(
          (sum, a) => sum + (a.cost || 0) + (a.transportCost || 0),
          0
        );
      }

        if (theme === "dark") {
          if (iconSun) iconSun.style.display = "none";
          if (iconMoon) iconMoon.style.display = "block";
        } else {
          if (iconSun) iconSun.style.display = "block";
          if (iconMoon) iconMoon.style.display = "none";
        }

          <div class="economico-card">
            <h4>${p.emoji} ${p.title[lang]}</h4>
            <p class="economico-desc">${p.description[lang]}</p>
            <p class="economico-cost">${formatCost(p.cost)} ${i18n[lang].economicoPerPerson || ""}</p>
          </div>
        `
          )
          .join("");
      }

      function renderCalendar() {
        const grid = document.getElementById("calendarGrid");
        grid.innerHTML = dates
          .map((dateStr) => {
            const d = new Date(dateStr + "T12:00:00");
            const num = d.getDate();
            const dayName = dayNames[lang][d.getDay()];
            return `<button type="button" class="day-card" data-date="${dateStr}" aria-label="${dateStr}">
          <span class="date-num">${num}</span>
          <span class="date-day">${dayName}</span>
        </button>`;
          })
          .join("");

        grid.querySelectorAll(".day-card").forEach((btn) => {
          btn.addEventListener("click", () => {
            grid
              .querySelectorAll(".day-card")
              .forEach((c) => c.classList.remove("active"));
            btn.classList.add("active");
            showDay(btn.dataset.date);
          });
        });
      }

      function showDay(dateStr) {
        const activities = itinerary[dateStr];
        const emptyState = document.getElementById("emptyState");
        const dayContent = document.getElementById("dayContent");

        if (!activities || activities.length === 0) {
          emptyState.style.display = "block";
          dayContent.style.display = "none";
          return;
        }

        emptyState.style.display = "none";
        dayContent.style.display = "block";

        const d = new Date(dateStr + "T12:00:00");
        const dayNamesFull = {
          es: [
            "Domingo",
            "Lunes",
            "Martes",
            "Miércoles",
            "Jueves",
            "Viernes",
            "Sábado",
          ],
          en: [
            "Sunday",
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
          ],
        };
        const months = {
          es: [
            "enero",
            "febrero",
            "marzo",
            "abril",
            "mayo",
            "junio",
            "julio",
            "agosto",
            "septiembre",
            "octubre",
            "noviembre",
            "diciembre",
          ],
          en: [
            "January",
            "February",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December",
          ],
        };

        document.getElementById("dayTitle").textContent =
          dayNamesFull[lang][d.getDay()];
        document.getElementById("dayDateBadge").textContent =
          `${d.getDate()} ${months[lang][d.getMonth()]} ${d.getFullYear()}`;
        const dayBudgetEl = document.getElementById("dayBudget");
        if (dayBudgetEl) {
          dayBudgetEl.textContent =
            (i18n[lang].budgetDay || "") + " " + formatCost(getDayTotal(dateStr));
        }

        const list = document.getElementById("activitiesList");
        list.innerHTML = activities
          .map(
            (a, i) => `
        <div class="activity-item" data-date="${dateStr}" data-index="${i}" role="button" tabindex="0">
          <span class="activity-time">${a.start} – ${a.end}</span>
          <div class="activity-content">
            <div class="title">${a.emoji || "📍"} ${a.activity[lang]}</div>
            <div class="place">${a.place !== "—" ? a.place + " · " : ""}${a.city}</div>
            <div class="activity-cost">${formatCost(a.cost)} ${(a.cost != null && a.cost > 0) ? (i18n[lang].perPerson || "por persona") : ""}</div>
          </div>
        </div>
      `,
          )
          .join("");

        list.querySelectorAll(".activity-item").forEach((el) => {
          el.addEventListener("click", () =>
            openModal(dateStr, parseInt(el.dataset.index, 10)),
          );
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              openModal(dateStr, parseInt(el.dataset.index, 10));
            }
          });
        });
      }

      function openModal(dateStr, index) {
        const activities = itinerary[dateStr];
        if (!activities || !activities[index]) return;
        const a = activities[index];
        const modal = document.getElementById("activityModal");
        const mapsUrl = a.mapsQuery
          ? "https://www.google.com/maps/search/?api=1&query=" +
            encodeURIComponent(a.mapsQuery)
          : "";

        document.getElementById("modalTitle").textContent =
          (a.emoji || "") + " " + a.activity[lang];
        document.getElementById("modalTime").textContent =
          a.start +
          " – " +
          a.end +
          (a.place !== "—" ? " · " + a.place + ", " + a.city : " · " + a.city);

        const imageWrap = document.getElementById("modalImageWrap");
        const modalImg = document.getElementById("modalImage");
        if (a.image && imageWrap && modalImg) {
          modalImg.src = a.image;
          modalImg.alt = a.place !== "—" ? a.place + ", " + a.city : a.activity[lang];
          imageWrap.style.display = "block";
        } else if (imageWrap) {
          imageWrap.style.display = "none";
          if (modalImg) modalImg.removeAttribute("src");
        }

        const addrWrap = document.getElementById("modalAddressWrap");
        if (a.address && a.address !== "—" && mapsUrl) {
          addrWrap.style.display = "block";
          document.getElementById("modalAddress").innerHTML =
            '<a href="' +
            mapsUrl +
            '" target="_blank" rel="noopener">' +
            (a.place !== "—" ? a.place + ", " + a.city : a.address) +
            " · " +
            (i18n[lang].modalViewMaps || "Ver en Google Maps") +
            "</a>";
        } else if (a.address && a.address !== "—") {
          addrWrap.style.display = "block";
          document.getElementById("modalAddress").textContent = a.address;
        } else {
          addrWrap.style.display = "none";
        }

        document.getElementById("modalDescription").textContent =
          a.description[lang];
        document.getElementById("modalTransport").textContent =
          a.transport[lang];

        const costWrap = document.getElementById("modalCostWrap");
        if (costWrap) {
          costWrap.style.display = "block";
          document.getElementById("modalCostPlan").innerHTML =
            "<strong>" + formatCost(a.cost) + "</strong> " + (i18n[lang].perPerson || "por persona");
          document.getElementById("modalCostTransport").innerHTML =
            "<strong>" + formatCost(a.transportCost) + "</strong> " + (i18n[lang].perPerson || "por persona");
        }
        document.querySelectorAll("#modalCostWrap .modal-section-title").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (key && i18n[lang][key]) el.textContent = i18n[lang][key];
        });

        document.querySelectorAll(".modal-section-title").forEach((el, i) => {
          const key = el.getAttribute("data-i18n");
          if (key && i18n[lang][key]) el.textContent = i18n[lang][key];
        });

        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        requestAnimationFrame(() => modal.classList.add("is-open"));
      }

      function closeModal() {
        const modal = document.getElementById("activityModal");
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      document
        .getElementById("modalClose")
        .addEventListener("click", closeModal);
      document
        .getElementById("activityModal")
        .addEventListener("click", (e) => {
          if (e.target === e.currentTarget) closeModal();
        });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      document.getElementById("tabActual").addEventListener("click", () => switchTab("actual"));
      document.getElementById("tabEconomico").addEventListener("click", () => switchTab("economico"));

      document.getElementById("themeToggle").addEventListener("click", () => {
        theme = theme === "light" ? "dark" : "light";
        localStorage.setItem("theme", theme);
        applyTheme();
      });

      document.getElementById("langToggle").addEventListener("click", () => {
        lang = lang === "es" ? "en" : "es";
        localStorage.setItem("lang", lang);
        applyLang();
      });

      applyTheme();
      applyLang();
    </script>
  </body>
</html>
